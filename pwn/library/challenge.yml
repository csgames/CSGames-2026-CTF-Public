# Required sections
name: "Library"
author: "1t1n1"
category: Pwn
description: |
    L'autre jour j'ai eu une idée extraordinaire! Eh oui, je suis assez confiant d'être la première personne à développer un logiciel de gestion de livres pour bibliothèques! Innovant, non? Pareillement, je suis très confiant que mon programme ne possède aucune vulnérabilité, mais juste au cas, je te l'envoie pour que tu puisses vérifier.

    Bien sûr, j'ai dû censurer les informations sensibles, mais rassure-toi, la version en production les contient toujours.

    Format du flag: `^CSGAMES{.*}$`

    ---

    The other day I had an extraordinary idea! Yes indeed, I am quite confident that I am the first person to develop library book management software! Innovative, isn’t it? Likewise, I am very confident that my program has no vulnerabilities whatsoever, but just to be safe, I’m sending it to you so you can check.

    Of course, I had to redact the sensitive information, but rest assured, the production version still contains it all.

    Flag format: `^CSGAMES{.*}$`

# CFSS:0.1/TS:I/E:M/HSFC:N=6-10 (chosen: 8)
value: 8
type: standard

